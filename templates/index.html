<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocal Editor GUI</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <h1>🎵 Vocal Editor GUI</h1>
  <div class="upload-area">
    <label class="btn btn-secondary">
      📁 Audio
      <input type="file" id="audioFile" accept=".wav,.mp3,.flac,.aiff" hidden>
    </label>
    <label class="btn btn-secondary">
      🎹 MIDI
      <input type="file" id="midiFile" accept=".mid,.midi" hidden>
    </label>
    <span id="fileStatus" class="file-status"></span>
  </div>
</header>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- LEFT PANEL: Parameters -->
  <aside class="param-panel">
    <h2>Parameters</h2>

    <section>
      <h3>Analysis</h3>
      <div class="param-group">
        <label>Min freq (Hz)<input type="number" id="p_min_frequency" value="75"></label>
        <label>Max freq (Hz)<input type="number" id="p_max_frequency" value="600"></label>
        <label>Time resolution (ms)<input type="number" id="p_time_resolution_ms" value="20"></label>
        <label>Freq tolerance (cents)<input type="number" id="p_frequency_tolerance_cents" value="100"></label>
        <label>Min note duration (ms)<input type="number" id="p_min_note_duration_ms" value="100"></label>
        <label>Max gap to bridge (ms)<input type="number" id="p_max_gap_to_bridge_ms" value="500"></label>
        <label>Silence threshold (dB)<input type="number" id="p_silence_threshold_db" value="-30"></label>
      </div>
    </section>

    <section>
      <h3>Correction</h3>
      <div class="param-group">
        <label>Transition ramp (ms)<input type="number" id="p_transition_ramp_ms" value="300"></label>
        <label>Gap threshold (ms)<input type="number" id="p_gap_threshold_ms" value="150"></label>
        <label>Correction strength (%)<input type="number" id="p_correction_strength" value="90" min="0" max="100"></label>
        <label>MIDI threshold (cents)<input type="number" id="p_midi_threshold_cents" value="80"></label>
      </div>
    </section>

    <section>
      <h3>Rubberband</h3>
      <div class="param-group">
        <label>Command<input type="text" id="p_rb_command" value="rubberband-r3"></label>
        <label>Crisp level (0-6)<input type="number" id="p_rb_crisp" value="3" min="0" max="6"></label>
        <label class="checkbox-label">
          <input type="checkbox" id="p_rb_formant" checked> Formant
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="p_rb_pitch_hq" checked> Pitch HQ
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="p_rb_window_long" checked> Window long
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="p_rb_smoothing" checked> Smoothing
        </label>
      </div>
    </section>

    <div class="action-buttons">
      <button class="btn btn-primary" id="btnAnalyze">Re-analyze</button>
      <button class="btn btn-primary" id="btnCorrect">Correct</button>
      <button class="btn btn-warning" id="btnUpdateAudio">Update Audio</button>
      <button class="btn btn-success" id="btnExport">Export</button>
    </div>
  </aside>

  <!-- CENTER: Plots + Waveform -->
  <main class="center-panel">

    <!-- Pitch figure -->
    <div class="plot-container">
      <div id="pitchPlot"></div>
      <div class="plot-controls">
        <button class="btn btn-secondary btn-sm" id="btnResetView">⟲ Reset View</button>
        <span class="zoom-hint">Scroll to zoom X · Shift+Scroll to zoom Y · Drag to pan · Drag note to shift pitch</span>
      </div>
      <div id="processingOverlay" class="processing-overlay hidden">
        <div class="processing-text">⏳ Processing...</div>
      </div>
    </div>

    <!-- Waveform -->
    <div class="waveform-container">
      <div id="waveform"></div>
      <div class="transport">
        <button class="btn btn-icon" id="btnPlay">▶</button>
        <button class="btn btn-icon" id="btnStop">■</button>
        <span id="playTime">0:00</span>
        <span class="sep">/</span>
        <span id="totalTime">0:00</span>
      </div>
    </div>

    <!-- Log -->
    <div class="log-container">
      <div id="logArea"></div>
    </div>

  </main>

  <!-- RIGHT PANEL: Selected cluster -->
  <aside class="cluster-panel">
    <h2>Selected Note</h2>
    <div id="clusterDetails" class="cluster-details">
      <p class="placeholder">Click a note box to select it</p>
    </div>
  </aside>

</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sine_player.js"></script>
<script src="/static/js/pitch_plot.js"></script>
<script src="/static/js/waveform.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
