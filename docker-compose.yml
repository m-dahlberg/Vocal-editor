services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_HOST=0.0.0.0
    volumes:
      - vocal-editor-tmp:/tmp/vocal_editor
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_BACKEND=http://backend:5000
      - BODY_SIZE_LIMIT=104857600
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vocal-editor-tmp:
